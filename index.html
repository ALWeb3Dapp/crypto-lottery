<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWLotteryToken 去中心化大樂透</title>
    <!-- 引入 Ethers.js V6 標準庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <style>
        /* 🎯 嚴格鎖定：黑底藍色科技風格 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214; /* 絕對深黑底 */
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1a1a1e; /* 深灰色面板 */
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            box-sizing: border-box;
            border: 1px solid #2d2d35;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }
        .info-panel {
            background: #26262b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #3a3a42;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .label { color: #9090a1; }
        .value { font-weight: 600; color: #0071e3; } /* 資訊值使用藍色 */
        
        /* 1~42顆球選號網格 */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .ball {
            aspect-ratio: 1;
            background: #2d2d35;
            border: 2px solid #44444f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            color: #ffffff;
        }
        .ball:hover {
            background: #3e3e4a;
            border-color: #0071e3;
        }
        /* ⚡ 點亮時：科技藍發光效果 */
        .ball.selected {
            background: #0071e3;
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 14px rgba(0, 113, 227, 0.7);
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .btn-connect { background-color: #ffffff; color: #121214; }
        .btn-random { background-color: #44444f; color: white; }
        .btn-submit { background-color: #0071e3; color: white; }
        
        .status-msg {
            text-align: center;
            color: #9090a1;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TLT Crypto Lottery</h1>
    
    <!-- 狀態資訊區 -->
    <div class="info-panel">
        <div class="info-item">
            <span class="label">目前期數:</span>
            <span class="value" id="roundId">未連結</span>
        </div>
        <div class="info-item">
            <span class="label">當期總獎池:</span>
            <span class="value" id="jackpotAmount">0.00 BNB</span>
        </div>
        <div class="info-item">
            <span class="label">本期截止時間:</span>
            <span class="value" id="endTime">未連結</span>
        </div>
    </div>

    <!-- 1 ~ 42 選號網格 -->
    <div class="number-grid" id="numberGrid"></div>

    <!-- 互動按鈕群 -->
    <div class="btn-group">
        <button class="btn-connect" onclick="connectWallet()">🌐 連結 MetaMask 錢包</button>
        <button class="btn-random" onclick="handleAutoSelect()">🎲 自動選號 (快選)</button>
        <button class="btn-submit" onclick="handleSubmitTicket()">🎟️ 確認投注 (0.005 BNB)</button>
    </div>
    
    <div class="status-msg" id="statusMsg">提示：請先連結錢包，選滿 6 個號碼即可投注。</div>
</div>

<script>
    // 合約對接配置
    const LOTTERY_CONTRACT_ADDRESS = "0xf8e81D47203A594245E36C48e151709F0C19fBe8"; 
    const LOTTERY_ABI = [
        {
            "inputs": [
                { "internalType": "address", "name": "_tltToken", "type": "address" },
                { "internalType": "address", "name": "_pancakeLP", "type": "address" }
            ],
            "stateMutability": "nonpayable",
            "type": "constructor"
        },
        {
            "inputs": [ { "internalType": "uint8[6]", "name": "_numbers", "type": "uint8[6]" } ],
            "name": "buyTicket",
            "outputs": [],
            "stateMutability": "payable",
            "type": "function"
        },
        {
            "inputs": [],
            "name": "drawLottery",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
        },
        {
            "inputs": [],
            "name": "currentRound",
            "outputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ],
            "stateMutability": "view",
            "type": "function"
        },
        {
            "inputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ],
            "name": "rounds",
            "outputs": [
                { "internalType": "uint256", "name": "startTime", "type": "uint256" },
                { "internalType": "uint256", "name": "endTime", "type": "uint256" },
                { "internalType": "uint256", "name": "initialEndTime", "type": "uint256" },
                { "internalType": "bool", "name": "isDrawn", "type": "bool" },
                { "internalType": "uint256", "name": "totalPool", "type": "uint256" },
                { "internalType": "uint256", "name": "firstPrizePool", "type": "uint256" },
                { "internalType": "uint256", "name": "secondPrizePool", "type": "uint256" },
                { "internalType": "uint256", "name": "thirdPrizePool", "type": "uint256" },
                { "internalType": "uint256", "name": "specialPrizePool", "type": "uint256" },
                { "internalType": "address", "name": "lastTicketOwner", "type": "address" },
                { "internalType": "uint256", "name": "totalTicketsBought", "type": "uint256" }
            ],
            "stateMutability": "view",
            "type": "function"
        }
    ];

    let provider;
    let signer;
    let lotteryContract;
    let userSelectedNumbers = [];

    // 初始化 1~42 的號碼球
    window.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('numberGrid');
        if (grid) {
            for (let i = 1; i <= 42; i++) {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.innerText = i;
                ball.id = `ball-${i}`;
                ball.addEventListener('click', () => toggleNumber(i));
                grid.appendChild(ball);
            }
        }
    });

    // 手動選號邏輯
    function toggleNumber(num) {
        const ball = document.getElementById(`ball-${num}`);
        if (!ball) return;
        
        if (userSelectedNumbers.includes(num)) {
            userSelectedNumbers = userSelectedNumbers.filter(n => n !== num);
            ball.classList.remove('selected');
        } else {
            if (userSelectedNumbers.length >= 6) {
                alert("每張彩券最多隻能選擇 6 個號碼！");
                return;
            }
            userSelectedNumbers.push(num);
            ball.classList.add('selected');
        }
        userSelectedNumbers.sort((a, b) => a - b);
        updateStatusMsg();
    }

    // 🎲 點擊「自動選號」
    function handleAutoSelect() {
        document.querySelectorAll('.ball').forEach(b => b.classList.remove('selected'));
        userSelectedNumbers = [];

        while (userSelectedNumbers.length < 6) {
            const num = Math.floor(Math.random() * 42) + 1;
            if (!userSelectedNumbers.includes(num)) {
                userSelectedNumbers.push(num);
            }
        }
        userSelectedNumbers.sort((a, b) => a - b);

        userSelectedNumbers.forEach(num => {
            const ball = document.getElementById(`ball-${num}`);
            if (ball) ball.classList.add('selected');
        });

        updateStatusMsg();
    }

    function updateStatusMsg() {
        const msg = document.getElementById('statusMsg');
        if (!msg) return;
        if(userSelectedNumbers.length === 0) {
            msg.innerText = "提示：請先連結錢包，選滿 6 個號碼即可投注。";
        } else {
            msg.innerText = `目前已選擇號碼：[ ${userSelectedNumbers.join(", ")} ] (${userSelectedNumbers.length}/6 碼)`;
        }
    }

    // 連結錢包
    async function connectWallet() {
        if (window.ethereum) {
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                lotteryContract = new ethers.Contract(LOTTERY_CONTRACT_ADDRESS, LOTTERY_ABI, signer);
                
                const userAddress = await signer.getAddress();
                alert(`錢包連結成功！\n地址: ${userAddress.substring(0,6)}...${userAddress.substring(38)}`);
                
                updateRoundInfo();
            } catch (error) {
                console.error("連結錢包失敗:", error);
            }
        } else {
            alert("未偵測到 MetaMask 錢包，請先安裝擴充功能！");
        }
    }

    // 讀取合約數據
    async function updateRoundInfo() {
        if (!lotteryContract) return;
        try {
            const currentRound = await lotteryContract.currentRound();
            const roundData = await lotteryContract.rounds(currentRound);
            
            const totalPoolBNB = ethers.formatEther(roundData.totalPool);
            const endTimeStr = new Date(Number(roundData.endTime) * 1000).toLocaleString();
            
            document.getElementById("roundId").innerText = `第 ${currentRound} 期`;
            document.getElementById("jackpotAmount").innerText = `${totalPoolBNB} BNB`;
            document.getElementById("endTime").innerText = endTimeStr;
        } catch (error) {
            console.error("更新數據失敗:", error);
        }
    }

    // 投注
    async function handleSubmitTicket() {
        if (!lotteryContract) {
            alert("請先點擊上方按鈕連結錢包！");
            return;
        }
        if (userSelectedNumbers.length !== 6) {
            alert("號碼數量不正確！請手動選滿 6 碼或點擊『自動選號』。");
            return;
        }

        try {
            document.getElementById('statusMsg').innerText = "請在 MetaMask 錢包確認交易...";
            
            const tx = await lotteryContract.buyTicket(userSelectedNumbers, {
                value: ethers.parseEther("0.005")
            });
            
            document.getElementById('statusMsg').innerText = "交易已發送，等待鏈上打包中...";
            await tx.wait();
            
            alert(`🎉 恭喜！投注交易成功！\n號碼：[ ${userSelectedNumbers.join(", ")} ]\n已為您 Mint 彩券 NFT。`);
            
            document.querySelectorAll('.ball').forEach(b => b.classList.remove('selected'));
            userSelectedNumbers = [];
            updateStatusMsg();
            updateRoundInfo(); 
        } catch (error) {
            document.getElementById('statusMsg').innerText = "交易失敗或已取消。";
            console.error("投注失敗:", error);
            if (error.reason) alert(`交易失敗: ${error.reason}`);
        }
    }
</script>

</body>
</html>
